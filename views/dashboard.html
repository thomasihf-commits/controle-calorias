<section class="app-shell dashboard-screen">
  <header class="mobile-header">
    <div>
      <p class="greeting">Hoje</p>
      <h1>Olá, Thomas</h1>
    </div>

    <button id="btnLogout" class="icon-button" title="Sair">
      ⏻
    </button>
  </header>

  <section class="summary-card">
    <div class="summary-label">🔥 Consumido hoje</div>

    <div class="summary-value">
      <span id="todayCalories">0</span>
      <small>kcal</small>
    </div>

    <div class="progress-wrapper">
      <div class="progress-bar">
        <div class="progress-fill" style="width: 0%;"></div>
      </div>
      <div class="progress-info">
        <span id="dailyGoal">Meta 2000 kcal</span>
        <span>Restam 2000 kcal</span>
      </div>
    </div>
  </section>

  <button id="btnNewMeal" class="primary-button full-width large-button">
    📷 Nova refeição
  </button>

  <nav class="bottom-nav">
    <button class="nav-item active">Hoje</button>
    <button class="nav-item">Refeições</button>
    <button class="nav-item">Histórico</button>
    <button class="nav-item">Perfil</button>
  </nav>
</section>
